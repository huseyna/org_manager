services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-django_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 5


  migrate:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py check && python manage.py migrate --noinput"


  test:
    build: .
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: pytest

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      test:
        condition: service_completed_successfully


